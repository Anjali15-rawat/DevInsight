name: DevInsight CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  # ─── Backend Pipeline ──────────────────────────────────────────────────────
  backend-test:
    name: Backend CI (Python 3.12)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devinsight
          POSTGRES_PASSWORD: devinsight_dev_password
          POSTGRES_DB: devinsight
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev

      - name: Install Dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Pytest
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          GITHUB_CLIENT_ID: mock-client-id
          GITHUB_CLIENT_SECRET: mock-client-secret
          GEMINI_API_KEY: mock-api-key
        run: |
          cd backend
          pytest tests/ -v

      - name: Build Docker Image (Backend)
        run: |
          cd backend
          docker build -t devinsight-backend:latest .

  # ─── Frontend Pipeline ─────────────────────────────────────────────────────
  frontend-test:
    name: Frontend CI (Node 20)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint and Format Verification
        run: |
          cd frontend
          npm run lint --if-present

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

      - name: Build Docker Image (Frontend)
        run: |
          cd frontend
          docker build -t devinsight-frontend:latest .
